% rebase('layout.html', usuario=usuario)

<h2>Clientes</h2>
% if erro:
    <p style="color: red;">{{erro}}</p>
% end

<div style="display: flex; gap: 40px; margin-top: 20px;">
    <!-- Lista -->
    <div style="flex: 2;">
        <h3>Lista de Clientes</h3>
        <table border="1" cellpadding="8" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Telefone</th>
                </tr>
            </thead>
            <tbody>
                % if not clientes:
                    <tr><td colspan="3">Nenhum cliente cadastrado.</td></tr>
                % else:
                    % for c in clientes:
                        <tr>
                            <td>{{c.nome}}</td>
                            <td>{{c.cpf}}</td>
                            <td>{{c.telefone}}</td>
                        </tr>
                    % end
                % end
            </tbody>
        </table>
    </div>
    
    <!-- Formulário -->
    <div style="flex: 1; border: 1px solid #ccc; padding: 20px; border-radius: 5px; height: fit-content;">
        <h3>Novo Cliente</h3>
        <form action="/clientes" method="POST">
            <p>
                <label>Nome:</label><br>
                <input type="text" name="nome" required style="width: 100%;">
            </p>
            <p>
                <label>CPF:</label><br>
                <input type="text" name="cpf" required placeholder="Apenas 11 números" style="width: 100%;">
            </p>
            <p>
                <label>Telefone:</label><br>
                <input type="text" name="telefone" required style="width: 100%;">
            </p>
            <button type="submit" style="width: 100%;">Cadastrar</button>
        </form>
    </div>
</div>
