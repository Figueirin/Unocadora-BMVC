% rebase('layout.html', usuario=usuario)

<h2>Dashboard</h2>
<div style="display: flex; gap: 20px; margin-top: 20px;">
    <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px; flex: 1;">
        <h3>Clientes</h3>
        <p style="font-size: 24px; font-weight: bold;">{{stats['total_clientes']}}</p>
    </div>
    <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px; flex: 1;">
        <h3>Veículos</h3>
        <p style="font-size: 24px; font-weight: bold;">{{stats['total_veiculos']}}</p>
    </div>
    <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px; flex: 1;">
        <h3>Locações</h3>
        <p style="font-size: 24px; font-weight: bold;">{{stats['total_locacoes']}}</p>
    </div>
</div>
