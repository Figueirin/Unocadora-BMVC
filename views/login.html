<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Unocadora</title>
</head>
<body style="font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px;">
    <div style="border: 1px solid #ccc; padding: 20px; border-radius: 5px; width: 300px;">
        <h2>Login Unocadora</h2>
        % if erro:
            <p style="color: red;">{{erro}}</p>
        % end
        <form action="/portal" method="POST">
            <p>
                <label>Usuário:</label><br>
                <input type="text" name="username" required style="width: 100%;">
            </p>
            <p>
                <label>Senha:</label><br>
                <input type="password" name="password" required style="width: 100%;">
            </p>
            <p>
                <button type="submit" style="width: 100%;">Entrar</button>
            </p>
        </form>
    </div>
</body>
</html>
